paper:
  title: "A coordinated adaptive multiscale enhanced spatio-temporal fusion network for multi-lead electrocardiogram arrhythmia detection"
  short_name: "STFAC-ECGNet"
  local_markdown: "/data/ljq24358/mutil_modal_datasets/paper/STFAC-ECGNet.md"
  local_pdf: "/data/ljq24358/mutil_modal_datasets/paper/STFAC-ECGNet.pdf"
  doi: "10.1038/s41598-024-71700-z"

interpretation:
  local_reproduction_required:
    reason: "The paper marks these rows as '(ours)' and describes the common preprocessing, optimizer, and split protocol used by the authors."
    ptbxl:
      - "CBMV-CNN"
      - "CAMV-RNN"
      - "STFAC-ECGNet"
    cpsc2018:
      - "CBMV-CNN"
      - "CAMV-RNN"
      - "STFAC-ECGNet"
      - "STFAC-ECGNet(only contains CBAM, without CASSAN and SSAN)"
  paper_reported_only:
    reason: "The comparison rows are named with literature citations and the paper gives no implementation, training, or same-image-generation protocol for reproducing them. Treat them as values reported by the STFAC-ECGNet paper unless we later choose a specific cited model to reimplement."

