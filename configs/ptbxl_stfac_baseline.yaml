seed: 2026
output_dir: /data/ljq24358/mutil_modal_datasets/experiments/ptbxl_stfac_baseline

data:
  dataset_type: ptbxl_windows
  root: /data/ljq24358/mutil_modal_datasets
  manifest: /data/ljq24358/mutil_modal_datasets/ptb-xl/processed/ptbxl_multimodal_manifest.csv
  window_manifest: /data/ljq24358/mutil_modal_datasets/ptb-xl/processed/ptbxl_signal_windows_2p5s.csv
  label_columns: [NORM, CD, MI, HYP, STTC]
  signal_column: signal_lr_path
  image_column: image_path
  image_size: 224
  image_channels: 3
  use_images: true

model:
  name: stfac
  image_in_channels: 3
  signal_hidden: 64
  image_channels: 128
  fusion_dim: 512
  dropout: 0.20
  contrastive_weight: 0.0
  modality_dropout: 0.0

train:
  epochs: 50
  batch_size: 96
  num_workers: 8
  lr: 0.0003
  weight_decay: 0.0001
  amp: true
  grad_clip_norm: 1.0
  early_stop_patience: 10

eval:
  aggregate_windows: true
