seed: 2026
output_dir: /data/ljq24358/mutil_modal_datasets/experiments/ptbxl_hifuse

data:
  root: /data/ljq24358/mutil_modal_datasets
  manifest: /data/ljq24358/mutil_modal_datasets/ptb-xl/processed/ptbxl_multimodal_manifest.csv
  label_columns: [NORM, CD, MI, HYP, STTC]
  signal_column: signal_hr_path
  image_column: image_path
  signal_length: 5000
  image_size: 336
  use_images: true

model:
  signal_checkpoint: pretrained/cpt_wfep_epoch_20.pt
  clip_model_path: pretrained/clip-vit-large-patch14-336
  fusion_dim: 512
  dropout: 0.15
  freeze_signal_encoder: true
  freeze_image_encoder: true
  token_fusion: true
  token_fusion_layers: 2
  token_fusion_heads: 8
  modality_dropout: 0.10
  contrastive_weight: 0.05

train:
  epochs: 30
  batch_size: 8
  num_workers: 4
  lr: 0.0001
  encoder_lr: 0.00001
  weight_decay: 0.05
  warmup_epochs: 2
  amp: true
  loss: asymmetric
  asl_gamma_pos: 0.0
  asl_gamma_neg: 4.0
  asl_clip: 0.05
  grad_clip_norm: 1.0
  early_stop_patience: 6
